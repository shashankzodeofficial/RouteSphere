name: Release — Tag & Publish

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Production build
        run: npm run build

      - name: Create release archive
        run: |
          TAG=${{ github.ref_name }}
          DATE=$(date +%Y-%m-%d)
          zip -r "${DATE}-${TAG}-routesphere-control-tower.zip" dist/ docs/ src/ public/ \
            package.json tsconfig.json vite.config.ts vercel.json .gitignore \
            --exclude "*.DS_Store" --exclude "node_modules/*"
          echo "ARCHIVE=${DATE}-${TAG}-routesphere-control-tower.zip" >> $GITHUB_ENV

      - name: Extract release notes
        id: notes
        run: |
          TAG=${{ github.ref_name }}
          python3 - <<'EOF'
          import re, sys
          with open('docs/RELEASE_NOTES.md') as f:
              content = f.read()
          # Find the first release section
          m = re.search(r'## \[v[\d.]+.*?\n(.*?)(?=\n## \[|$)', content, re.DOTALL)
          notes = m.group(0).strip() if m else "See CHANGELOG.md for details."
          with open('/tmp/release_notes.md', 'w') as out:
              out.write(notes)
          EOF
          echo "Notes extracted"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: RouteSphere Control Tower ${{ github.ref_name }}
          body_path: /tmp/release_notes.md
          files: ${{ env.ARCHIVE }}
          draft: false
          prerelease: false
